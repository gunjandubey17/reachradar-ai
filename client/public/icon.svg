<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#c7d2fe"/>
    </linearGradient>
  </defs>
  <!-- Background with rounded corners for maskable -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Outer radar ring -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="url(#ring)" stroke-width="14" opacity="0.5"/>
  <!-- Middle radar ring -->
  <circle cx="256" cy="256" r="95" fill="none" stroke="url(#ring)" stroke-width="12" opacity="0.7"/>
  <!-- Inner radar ring -->
  <circle cx="256" cy="256" r="50" fill="none" stroke="white" stroke-width="10" opacity="0.85"/>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="20" fill="white"/>
  <!-- Radar sweep line -->
  <line x1="256" y1="256" x2="370" y2="155" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.95"/>
  <!-- Signal dots -->
  <circle cx="320" cy="180" r="8" fill="#34d399" opacity="0.9"/>
  <circle cx="185" cy="340" r="8" fill="#f87171" opacity="0.9"/>
  <circle cx="350" cy="300" r="8" fill="#fbbf24" opacity="0.9"/>
</svg>
